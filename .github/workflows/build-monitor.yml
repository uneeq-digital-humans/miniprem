name: Build & Push miniprem-monitor to Harbor
on:
  push:
    branches: [main]
    paths: ['miniprem-monitor/**']
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: cr.uneeq.io
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./miniprem-monitor
          file: ./miniprem-monitor/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            cr.uneeq.io/uneeq/miniprem-monitor:latest
            cr.uneeq.io/uneeq/miniprem-monitor:${{ github.sha }}
          cache-from: type=registry,ref=cr.uneeq.io/uneeq/miniprem-monitor:buildcache
          cache-to: type=registry,ref=cr.uneeq.io/uneeq/miniprem-monitor:buildcache,mode=max
