<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>MiniPrem Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="MiniPrem - Digital Human Platform with LLM Integration">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Dark theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/dark.css" />

  <!-- Add Swagger UI for API docs -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/swagger-ui-dist@5.1.0/swagger-ui.css">
  <link rel="stylesheet" href="assets/miniprem.css" />

  <!-- Custom MiniPrem configuration - MUST be before Docsify -->
  <script>
    // Store service base URLs
    const serviceBaseUrls = {
      flowise: 'http://localhost:3000',
      vllm: 'http://localhost:8000',
      renny: 'http://localhost:8081',
      prometheus: 'http://localhost:9090',
      grafana: 'http://localhost:3001'
    };


    // Initialize Docsify configuration
    window.$docsify = {
      name: 'MiniPrem',
      repo: 'https://gitlab.com/tgmerritt/miniprem-2025',
      loadSidebar: true,
      subMaxLevel: 2,
      coverpage: true,
      auto2top: true,
      noCompile: false,
      themeColor: '#42b983',
      plugins: [],

    };

  </script>
</head>

<body>
  <!-- Dark Mode Toggle Button -->
  <button id="dark-mode-toggle" class="dark-mode-toggle">
    <svg id="sun-icon" class="hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
    </svg>
    <svg id="moon-icon" class="hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
    </svg>
  </button>

  <div id="app"></div>

  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-yaml.min.js"></script>

  <!-- Swagger UI -->
  <script src="//cdn.jsdelivr.net/npm/swagger-ui-dist@5.1.0/swagger-ui-bundle.js"></script>
  <script src="//cdn.jsdelivr.net/npm/swagger-ui-dist@5.1.0/swagger-ui-standalone-preset.js"></script>

  <!-- Custom MiniPrem scripts (after Docsify is loaded) -->
  <script src="assets/miniprem.js"></script>
  <!-- <script src="assets/coverpage-handler.js"></script> -->
  <!-- <script src="assets/language-switcher.js"></script> -->
  <!-- <script src="assets/translation-status.js"></script> -->



  <!-- Dark Mode Toggle Functionality -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const darkModeToggle = document.getElementById('dark-mode-toggle');
      const sunIcon = document.getElementById('sun-icon');
      const moonIcon = document.getElementById('moon-icon');
      const html = document.documentElement;

      function updateIcons() {
        if (html.classList.contains('dark')) {
          sunIcon.classList.remove('hidden');
          moonIcon.classList.add('hidden');
        } else {
          sunIcon.classList.add('hidden');
          moonIcon.classList.remove('hidden');
        }
      }

      // Set initial state
      if (localStorage.getItem('darkMode') === 'true' ||
          (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches && !localStorage.getItem('darkMode'))) {
        html.classList.add('dark');
      } else {
        html.classList.remove('dark');
      }
      updateIcons();

      // Toggle dark mode
      darkModeToggle.addEventListener('click', () => {
        html.classList.toggle('dark');
        if (html.classList.contains('dark')) {
          localStorage.setItem('darkMode', 'true');
        } else {
          localStorage.setItem('darkMode', 'false');
        }
        updateIcons();
      });
    });
  </script>
</body>

</html>
