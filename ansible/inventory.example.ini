# Copy to inventory.ini. The single target is the box being built (bootstrap)
# OR a control host with kubectl/helm + a kubeconfig (existing cluster).
#
# Bootstrap a remote Dell box:
[uneeq]
dell-box ansible_host=10.0.2.81 ansible_user=admin

# Existing cluster from your laptop (set bootstrap_cluster=false, kubeconfig=~/.kube/config):
# [uneeq]
# localhost ansible_connection=local
