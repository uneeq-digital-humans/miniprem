---
# All k8s secrets the stack needs, created from group_vars (never committed).
# Uses create|apply so re-runs are idempotent. KUBECONFIG drives the target.
- name: Ensure namespaces
  ansible.builtin.shell: |
    kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -
  loop: [uneeq, nim-models, advanced-rag]
  environment: { KUBECONFIG: "{{ kubeconfig }}" }
  changed_when: false

- name: NGC image-pull secret (nvcr.io) in each namespace that pulls NIMs
  ansible.builtin.shell: |
    kubectl create secret docker-registry ngc-registry-credentials -n {{ item }} \
      --docker-server=nvcr.io --docker-username='$oauthtoken' \
      --docker-password='{{ ngc_api_key }}' \
      --dry-run=client -o yaml | kubectl apply -f -
  loop: [uneeq, nim-models, advanced-rag]
  environment: { KUBECONFIG: "{{ kubeconfig }}" }
  changed_when: false
  no_log: true

- name: NGC API key (generic) for RAG model downloads
  ansible.builtin.shell: |
    kubectl create secret generic ngc-api -n advanced-rag \
      --from-literal=NGC_API_KEY='{{ ngc_api_key }}' \
      --dry-run=client -o yaml | kubectl apply -f -
  environment: { KUBECONFIG: "{{ kubeconfig }}" }
  changed_when: false
  no_log: true

- name: Harbor image-pull secret (cr.uneeq.io) for Renny/kiosk/asr
  ansible.builtin.shell: |
    kubectl create secret docker-registry harbor-credentials -n uneeq \
      --docker-server=cr.uneeq.io --docker-username='{{ harbor_username }}' \
      --docker-password='{{ harbor_password }}' \
      --dry-run=client -o yaml | kubectl apply -f -
  environment: { KUBECONFIG: "{{ kubeconfig }}" }
  when: harbor_username | length > 0
  changed_when: false
  no_log: true

- name: Renny secret (DHOP api key; elevenlabs key empty so the container starts)
  ansible.builtin.shell: |
    kubectl create secret generic renny -n uneeq \
      --from-literal=dhop-api-key='{{ dhop_api_key }}' \
      --from-literal=tts-elevenlabs-api-key='' \
      --dry-run=client -o yaml | kubectl apply -f -
  environment: { KUBECONFIG: "{{ kubeconfig }}" }
  changed_when: false
  no_log: true
