image: "cr.uneeq.io/dell-isg-containers/digitalhuman-interface:0.238-6bfec"

imagePullSecrets:
  - name: harbor-credentials

# Container env overrides for the image's nginx upstreams. The image defaults
# assume sibling charts in the SAME namespace (rag-adapter, host-helper,
# digitalhuman-asr) plus an on-box RAG blueprint. For BYO/distributed deploys:
#   env:
#     KIOSK_RAG_URL: "http://<your-rag-server>:8081"
# Since image nvidia-1.0.4 a missing/unset upstream only 502s its own route —
# it can no longer prevent the kiosk from starting.
env: {}

replicas: 1

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  host: "digitalhuman.miniprem"
  # Appliance: also answer on a catch-all (any host) so the LAN IP works, not just
  # the hostname/localhost. This chart is on-box only, so true is safe here.
  catchAll: true
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"

resources:
  requests:
    cpu: "200m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# Runtime configuration injected into /usr/share/nginx/html/config.yaml
# via a ConfigMap mount. The shape must match the app's Config interface
# (interface/src/types/utils/Config.ts).
#
# Customers should override these values at install time, e.g.:
#   helm install ... \
#     --set config.personas.en.cloud.id=<persona-id> \
#     --set config.apis.pixabay.api_key=<key>
config:
  app:
    name: "Digital Human Kiosk"
    environment: "production"   # development | staging | production
    autoStartMic: true

  # Admin-surface security posture.
  # allowInsecureAdmin=true lets the Settings password unlock be used from
  # NON-localhost origins — including plain http:// over the LAN, where the
  # password crosses the network UNENCRYPTED. Intended ONLY for initial setup
  # and troubleshooting (a tech's laptop at http://<box-ip> before TLS exists);
  # the kiosk shows a warning banner whenever it is used remotely.
  # STRONGLY RECOMMENDED to keep false in production and serve the kiosk behind
  # a verified SSL certificate instead (scripts/setup-kiosk-tls.sh) — with a
  # trusted cert the browser unlocks over HTTPS and this flag is unnecessary.
  security:
    allowInsecureAdmin: false

  # Per-language persona definitions. Each language has both a "cloud" (UneeQ
  # hosted) and "miniprem" (on-prem) variant. Customers typically need to
  # change the `id` to their own UneeQ persona ID.
  personas:
    en:
      cloud:
        CDN: "https://cdn-eu.uneeq.io/hosted-experience/deploy/index.js"
        API: "https://api-eu.uneeq.io"
        id: ""
      miniprem:
        CDN: "https://cdn-eu.uneeq.io/hosted-experience/deploy/index.js"
        API: "https://api-eu.uneeq.io"
        id: ""

  apis:
    pixabay:
      api_key: ""
      api_url: "https://pixabay.com/api/"

  # Backend WebSocket API the frontend connects to.
  backend:
    endpoints:
      ws: "ws://digitalhuman-api.miniprem/ws"
      http: "http://digitalhuman-api.miniprem"
    key: ""

  # Speech-to-text provider. Use "riva" for the on-prem NVIDIA Riva sidecar
  # shipped by the digitalhuman-asr chart, or "deepgram" for cloud STT.
  stt:
    provider: "riva"
    # Riva STT WebSocket endpoint AS SEEN FROM THE VISITOR'S BROWSER.
    # EMPTY = same-origin: the kiosk page's own host proxies /api/asr to the
    # riva-ws-proxy, which dials whatever Riva gRPC address the asr chart is
    # configured with (local NIM or a remote/BYO Riva) — works on EVERY
    # deployment. Only set this when the ws-proxy is exposed on a DIFFERENT
    # public host than the kiosk page. An appliance-only hostname here (the
    # old digitalhuman-asr.miniprem default) does not resolve from customer
    # browsers and silently killed live speech input off-appliance.
    rivaUrl: ""
    language: "en-US"

  # RAG adapter admin API, used by the kiosk Settings "Brain" tab to edit the
  # persona prompt and manage documents. adminUrl is a path on the kiosk host
  # routed to the rag-adapter by its ingress (see digitalhuman-rag-adapter).
  rag:
    adminUrl: "/rag-admin"
    adminKey: ""

  # Conversation ownership. On the all-in-one box the KIOSK owns the call:
  # it POSTs the native NVIDIA RAG payload directly to the RAG server and
  # Direct-Speaks the answer, bypassing UneeQ's persona conversation endpoint.
  # Operators can change all of this in the kiosk Settings ▸ Brain tab.
  #   provider: "rag" | "uneeq"
  conversation:
    provider: "rag"
    generation: "nim"   # retrieve from RAG, generate with the Gemma NIM directly (full control)
    streaming: false
    memory: "inline"    # fold recent turns into the question so context is never lost
    # ALL-IN-ONE DEFAULTS = localhost. The kiosk's Chrome runs ON the box, so
    # every service is reachable at localhost on its fixed port — zero config,
    # and localhost is a Chrome "secure context" so even streaming works over
    # plain http. Operators normally never touch these; the Brain tab can
    # override only for the unusual case of a remote/separate RAG cluster.
    rag:
      endpoint: "http://localhost:8081/v1/generate"      # RAG blueprint generate (generation=rag)
      searchEndpoint: "http://localhost:8081/v1/search"  # RAG retriever (generation=nim)
      collectionNames: ["multimodal_data"]
      useKnowledgeBase: true
      enableReranker: true
      enableCitations: true
    nim:
      endpoint: "http://localhost:8000/v1/chat/completions"  # Gemma NIM (generation=nim)
      model: "google/gemma-4-26B-A4B-it"   # turnkey Dell default — EXACT id the NIM serves (/v1/models)

  # When true, the mic button is rendered directly on the kiosk page (no QR
  # code / phone-as-remote flow).
  standalone: true

  # UneeQ SDK option overrides — all VAD/mic disabled by default.
  # Override any key via: --set config.uneeq.<key>=<value>
  uneeq:
    enableMicrophone: false
    enableVad: false
    enableInterruptBySpeech: false
    showUserInputInterface: false
    autoStart: false
