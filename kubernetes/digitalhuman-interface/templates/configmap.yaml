apiVersion: v1
kind: ConfigMap
metadata:
  name: digitalhuman-interface-config
  namespace: {{ .Release.Namespace }}
data:
  # Rendered verbatim from .Values.config — shape must match the app's
  # Config interface (interface/src/types/utils/Config.ts).
  # Mounted at /usr/share/nginx/html/assets/config.yaml in the pod and
  # fetched at runtime by useConfig().
  config.yaml: |
{{ toYaml .Values.config | indent 4 }}
