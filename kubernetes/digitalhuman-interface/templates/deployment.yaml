apiVersion: apps/v1
kind: Deployment
metadata:
  name: digitalhuman-interface
  namespace: {{ .Release.Namespace }}
  labels:
    app: digitalhuman-interface
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: digitalhuman-interface
  template:
    metadata:
      labels:
        app: digitalhuman-interface
      annotations:
        # Roll the pods whenever the rendered ConfigMap content changes, so
        # `helm upgrade --set config.…` picks up automatically. Needed
        # because the config is mounted with subPath (no live update).
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
      - name: {{ .name }}
      {{- end }}
      containers:
      - name: interface
        image: {{ .Values.image }}
        # Default IfNotPresent so a ctr-imported (ISO-baked) image is used as-is —
        # otherwise a ":latest" tag defaults to Always and the box tries (and fails)
        # to pull from Harbor. Set imagePullPolicy: Always in values to force a pull.
        imagePullPolicy: {{ .Values.imagePullPolicy | default "IfNotPresent" }}
        {{- if .Values.env }}
        # BYO upstream overrides — e.g. env.KIOSK_RAG_URL for a RAG server that
        # is not at the image default (rag-server.advanced-rag.svc.cluster.local).
        env:
        {{- range $k, $v := .Values.env }}
        - name: {{ $k }}
          value: {{ $v | quote }}
        {{- end }}
        {{- end }}
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        volumeMounts:
        - name: config
          mountPath: /usr/share/nginx/html/config.yaml
          subPath: config.yaml
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: digitalhuman-interface-config
