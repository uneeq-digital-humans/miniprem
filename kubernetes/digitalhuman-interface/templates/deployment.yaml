apiVersion: apps/v1
kind: Deployment
metadata:
  name: digitalhuman-interface
  namespace: {{ .Release.Namespace }}
  labels:
    app: digitalhuman-interface
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: digitalhuman-interface
  template:
    metadata:
      labels:
        app: digitalhuman-interface
      annotations:
        # Roll the pods whenever the rendered ConfigMap content changes, so
        # `helm upgrade --set config.…` picks up automatically. Needed
        # because the config is mounted with subPath (no live update).
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
      - name: {{ .name }}
      {{- end }}
      containers:
      - name: interface
        image: {{ .Values.image }}
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        volumeMounts:
        - name: config
          mountPath: /usr/share/nginx/html/config.yaml
          subPath: config.yaml
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: digitalhuman-interface-config
