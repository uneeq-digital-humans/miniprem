apiVersion: apps.nvidia.com/v1alpha1
kind: NIMCache
metadata:
  name: {{ .Values.name }}-cache
  namespace: {{ .Values.namespace }}
spec:
  resources: {}
  source:
    ngc:
      authSecret: {{ .Values.auth.authSecret }}
      model:
        profiles:
          - {{ .Values.model.profile | quote }}
      modelPuller: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
      pullSecret: {{ .Values.auth.pullSecret }}
  storage:
    pvc:
      create: {{ .Values.cache.pvc.create }}
      size: {{ .Values.cache.pvc.size }}
      storageClass: {{ .Values.cache.pvc.storageClass }}
      volumeAccessMode: {{ .Values.cache.pvc.accessMode }}
---
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMService
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  authSecret: {{ .Values.auth.authSecret }}
  # /opt/nim/fallback.yaml is a full AsyncEngineArgs passthrough (the NIM's
  # vllm.py loader filters keys against `fields(AsyncEngineArgs)` and calls
  # `AsyncEngineArgs(**engine_args)`) — unlike NIM_PASSTHROUGH_ARGS, which is
  # silently ignored by this build (verified on T2, 2026-07-08). Patch it here
  # before start_server reads it. gpu_memory_utilization is always patched;
  # speculative_config is appended when mtp.enabled (ON by default — MTP validated
  # on T2 2026-07-09; see values.yaml). Disable mtp for VRAM-constrained boxes.
  command:
    - /bin/sh
    - -c
    - |
      sed -i 's/gpu_memory_utilization: 0.9/gpu_memory_utilization: {{ .Values.gpuMemoryUtilization }}/g' /opt/nim/fallback.yaml
      {{- if .Values.mtp.enabled }}
      printf 'speculative_config:\n  model: "%s"\n  num_speculative_tokens: %s\n' {{ .Values.mtp.draftModelPath | quote }} {{ .Values.mtp.numSpeculativeTokens }} >> /opt/nim/fallback.yaml
      {{- end }}
      exec /usr/local/bin/start_server
  env:
    - name: NIM_MODEL_PROFILE
      value: {{ .Values.model.profile | quote }}
    {{- if .Values.relaxMemConstraints }}
    - name: NIM_RELAX_MEM_CONSTRAINTS
      value: "1"
    {{- end }}
    {{- if .Values.kvCacheReuse }}
    - name: NIM_ENABLE_KV_CACHE_REUSE
      value: "1"
    {{- end }}
    {{- if .Values.kvCacheSeqLens }}
    - name: NIM_NUM_KV_CACHE_SEQ_LENS
      value: {{ .Values.kvCacheSeqLens | quote }}
    {{- end }}
    {{- /* No NIM_PASSTHROUGH_ARGS --max-model-len: verified ignored by this NIM
           build (see values.yaml note). max_model_len stays the profile default. */}}
    {{- range $k, $v := .Values.extraEnv }}
    - name: {{ $k }}
      value: {{ $v | quote }}
    {{- end }}
  expose:
    service:
      port: {{ .Values.service.port }}
      type: {{ .Values.service.type }}
  image:
    pullPolicy: {{ .Values.image.pullPolicy }}
    pullSecrets:
      - {{ .Values.auth.pullSecret }}
    repository: {{ .Values.image.repository }}
    tag: {{ .Values.image.tag }}
  replicas: {{ .Values.replicas }}
  resources:
    limits:
      nvidia.com/gpu: {{ index .Values.resources.limits "nvidia.com/gpu" | default 1 }}
  storage:
    nimCache:
      name: {{ .Values.name }}-cache
