apiVersion: v1
kind: ServiceAccount
metadata:
  name: miniprem-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    app: miniprem-monitor
{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-miniprem-monitor-read
  labels:
    app: miniprem-monitor
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "nodes/metrics", "services", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-miniprem-monitor-read
  labels:
    app: miniprem-monitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-miniprem-monitor-read
subjects:
  - kind: ServiceAccount
    name: miniprem-monitor
    namespace: {{ .Release.Namespace }}
{{- end }}
