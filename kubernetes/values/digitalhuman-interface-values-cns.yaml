# CNS overrides for digitalhuman-interface
# Secrets injected at deploy time via --set:
#   --set config.personas.en.miniprem.id=<persona-id>
#   --set config.personas.en.cloud.id=<persona-id>
#   --set config.backend.key=<backend-key>
replicas: 1

config:
  app:
    name: "Dell Technologies Kiosk"
    environment: "production"

  personas:
    en:
      cloud:
        CDN: "https://cdn.uneeq.io/hosted-experience/deploy/index.js"
        API: "https://api.uneeq.io"
        id: ""
      miniprem:
        CDN: "https://cdn.enterprise.uneeq.io/hosted-experience/deploy/index.js"
        API: "https://api.enterprise.uneeq.io"
        id: ""

  backend:
    endpoints:
      ws: "ws://digitalhuman-api.miniprem/ws"
      http: "http://digitalhuman-api.miniprem"
    key: ""

  standalone: true

  # Setup/troubleshooting escape hatch: true lets the Settings password unlock
  # work from non-localhost origins (e.g. a tech's laptop at http://<box-ip>)
  # BEFORE TLS is configured — the password then crosses the LAN unencrypted and
  # the kiosk shows a warning banner. Prefer false + a verified SSL certificate
  # (scripts/setup-kiosk-tls.sh) in production. Enabled here for the CNS test
  # appliance so Settings are reachable over the LAN during bring-up.
  security:
    allowInsecureAdmin: true

  # Conversation: kiosk owns it and talks to the local NVIDIA stack via the
  # rag-adapter. generation=nim => the SPA POSTs OpenAI chat-completions to the
  # adapter, which proxies to the Gemma NIM AND traces to Phoenix. The endpoint is
  # same-origin (/v1/chat/completions) — the adapter's ingress routes /v1 on this
  # kiosk host to rag-adapter:8085 (see digitalhuman-rag-adapter ingress).
  conversation:
    provider: "rag"
    generation: "nim"
    # Server-side session memory: the endpoint below is same-origin → the
    # rag-adapter, whose Redis window (keyed by the x-session-id the SPA sends)
    # supplies remembered turns. The SPA sends ONLY the current message — the
    # prompt no longer grows every turn, and voice/typed/remote-mic share one
    # conversation. Use "inline" instead when pointing nim.endpoint at a BYO
    # LLM that bypasses the adapter.
    memory: "session"
    streaming: false
    nim:
      endpoint: "/v1/chat/completions"
      model: "google/gemma-4-31B-it"

  stt:
    provider: "riva"
    # Empty = same origin: the kiosk nginx proxies /api/asr/ -> riva-ws-proxy, so
    # the STT websocket inherits the page scheme (wss:// under HTTPS, ws:// under
    # http). Do NOT hardcode http://digitalhuman-asr.miniprem here — an absolute
    # http URL is blocked as mixed content once the kiosk is served over HTTPS.
    # Set an absolute wss:// URL only for a TLS-fronted BYO/remote Riva.
    rivaUrl: ""
    language: "en-US"

  # UneeQ SDK options — mirrors enterprise hosted experience reference defaults.
  # Override any key via: --set config.uneeq.<key>=<value>
  uneeq:
    enableMicrophone: false
    showUserInputInterface: false
    enableVad: false
    enableInterruptBySpeech: false
    autoStart: false
    displayCallToAction: true
    renderContent: true
    mobileViewWidthBreakpoint: 900
    layoutMode: "fullScreen"
    cameraAnchorHorizontal: "center"
    cameraAnchorDistance: "loose_close_up"
    logLevel: "info"
    containedAutoLayout: true
    showClosedCaptions: true
    captionsPosition: "bottom-left"
    speechRecognitionHintPhrasesBoost: 0
    allowResumeSession: false
    forceTURN: false
    audioUpstreamMode: "speech-recognition-service"
    speechRecognitionProvider: "google"
    sttDeepgramModel: "nova-3"
    sttDeepgramUtteranceEndMs: 1500
    sttDeepgramSmartFormat: true
    sttDeepgramInterimResults: true
    sttDeepgramInterruptionWordThreshold: 1
    sttDeepgramFillerWords: false
    sttDeepgramEndpointing: 500
    sttDeepgramSafetyNetTimeoutMs: 5000
    sttDeepgramNoDelay: false
    sttDeepgramEotThreshold: 0.7
    sttDeepgramUseEagerEndOfTurn: true
