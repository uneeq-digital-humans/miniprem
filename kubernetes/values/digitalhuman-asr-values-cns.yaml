# CNS overrides for digitalhuman-asr
# RTX Pro 6000 (96 GB VRAM) – Nemotron uses ~15 GiB
replicas: 1
nemotron:
  resources:
    requests:
      cpu: "2000m"
      memory: "8Gi"
      nvidia.com/gpu: 1
    limits:
      cpu: "4000m"
      memory: "16Gi"
      nvidia.com/gpu: 1
  shmSize: "8Gi"
  modelCacheSize: "50Gi"
# CNS single-node: no nodeSelector needed (remove to allow any node)
nodeSelector: {}
