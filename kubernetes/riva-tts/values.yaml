namespace: nim-models
image: nvcr.io/nim/nvidia/magpie-tts-multilingual:latest
imagePullSecret: ngc-registry-credentials
ngcSecret: nim-credentials            # secret holding NGC_API_KEY
# batch_size=8 ≈ 11 GB; raise to 32 (~31 GB) if the GPU has room.
tagsSelector: "name=magpie-tts-multilingual,batch_size=8"
storage:
  size: 30Gi
  storageClass: local-path
# Scheduling: pin to the GPU/renderer node. Empty nodeSelector = schedule anywhere.
nodeSelector:
  uneeq.io/node-type: renderer
runtimeClassName: nvidia
resources:
  requests: { cpu: "2", memory: 8Gi, "nvidia.com/gpu": "1" }
  limits:   { cpu: "4", memory: 16Gi, "nvidia.com/gpu": "1" }
