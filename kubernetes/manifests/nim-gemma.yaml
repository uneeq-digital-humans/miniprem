# Gemma LLM via the NVIDIA NIM Operator (preferred on Blackwell / RTX 6000:
# NV-FP4 quantization fits ~28 GB VRAM and shares the GPU via time-slicing).
#
# Prerequisites (installed by the GPU/NIM stack in deploy-allinone.sh):
#   - NIM Operator CRDs (apps.nvidia.com/v1alpha1: NIMCache, NIMService)
#   - Secrets in namespace nim-models: ngc-registry-credentials (image pull),
#     nim-credentials (NGC_API_KEY)
#   - The static PV/PVC below (apply BEFORE this file) so the cache survives a
#     kubeadm reset — see kubernetes/manifests/nim-gemma-cache-pv.yaml
#
# This is the NIM-operator alternative to manifests/vllm-gemma4.yaml. Select it
# with GEMMA_BACKEND=nim in deploy-allinone.sh. Validate the image tag/profile
# against NGC for your GPU.
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMCache
metadata:
  name: gemma-cache
  namespace: nim-models
spec:
  source:
    ngc:
      modelPuller: nvcr.io/nim/google/gemma-4-26b-a4b-it:1.7.0-variant
      pullSecret: ngc-registry-credentials
      authSecret: nim-credentials
      # Pinned (not auto/no-filter): with no profile filter, the cache job
      # explores multiple untagged "fallback" profiles on every run (tp=2,
      # tp=1 bf16, tp=1 nvfp4, ...) instead of converging on one — each boot
      # grew the cache further (90GB -> 130GB) rather than fast-verifying
      # existing content (discovered 2026-07-07). Pin to the exact same tp=1
      # nvfp4 fallback hash as the NIMService's storage.nimCache.profile
      # below, so caching is deterministic and bounded (~35-40GB) and a
      # repeat run genuinely short-circuits via blake3 content matching.
      model:
        profiles:
          - "98504107c270d21f1cd8997de34c06e4e277f724c949d509cc64d39aef3e98d9"
  storage:
    pvc:
      create: true
      # Explicit name so it deterministically matches the static PV's
      # claimRef (nim-gemma-cache-pv.yaml pins claimRef.name:
      # gemma-cache-pvc). Without this the operator derives the PVC name
      # from the NIMCache name, and any mismatch leaves the PVC Pending
      # forever — Gemma never starts and the "no re-download" cache is
      # never used. Keep this and the PV's claimRef in lockstep.
      name: "gemma-cache-pvc"
      # Non-default SC on purpose: "local-path" is this cluster's default, and a
      # PVC with storageClass:"" gets dynamically provisioned by it (ignoring our
      # static PV below). Naming an explicit non-default class forces binding to
      # the pre-created PV instead — see nim-gemma-cache-pv.yaml.
      storageClass: "static-nim"
      size: "100Gi"
      volumeAccessMode: ReadWriteOnce
  resources: {}
---
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMService
metadata:
  name: gemma
  namespace: nim-models
spec:
  image:
    repository: nvcr.io/nim/google/gemma-4-26b-a4b-it
    tag: 1.7.0-variant
    pullPolicy: IfNotPresent
    pullSecrets:
      - ngc-registry-credentials
  authSecret: nim-credentials
  storage:
    nimCache:
      name: gemma-cache
      # Pinned, NOT auto-select: gemma-4-26b-a4b-it's manifest has no profile
      # tagged for our exact GPU (RTX PRO 6000 Blackwell, pci.device_id
      # 2bb5:10de) — none of the hardware-matched "throughput" profiles apply,
      # so auto-select falls through to the manifest's FIRST untagged
      # "fallback" profile, which happens to be tp=2 (needs 2 GPUs) and
      # crash-loops with NIMProfileIDNotFound on this single-GPU box
      # (discovered 2026-07-07). This hash is the tp=1 nvfp4 fallback profile
      # — matches the default already pinned in kubernetes/nim-gemma/values.yaml
      # (the standalone helm chart), just never carried over to this
      # NIM-operator CRD manifest. Re-verify if the NIM image tag/version ever
      # changes — profile hashes are tied to the manifest content.
      profile: "98504107c270d21f1cd8997de34c06e4e277f724c949d509cc64d39aef3e98d9"
  replicas: 1
  resources:
    limits:
      nvidia.com/gpu: 1
  expose:
    service:
      type: ClusterIP
      port: 8000
  # MCP / tool-calling enabled for agentic RAG flows.
  env:
    - name: NIM_ENABLE_KV_CACHE_REUSE
      value: "1"
    # Shared (time-sliced) GPU: the NIM's default 0.85 GPU-mem-utilization check
    # fails when Renny/Riva already hold VRAM ("free memory < desired"). Relaxing
    # the constraint lets it start, capped low enough to co-exist with Renny on
    # the shared 97 GiB Blackwell. Official NIM mechanism to forward vLLM CLI
    # args (the env knobs don't move gpu_memory_utilization).
    # https://docs.nvidia.com/nim-operator/latest/service.html
    #
    # 0.45 (~44 GiB) was calibrated for the ORIGINAL 31b model and is too tight
    # for 26b: vLLM's startup sampler warmup profiles a full 128-request batch
    # (deliberately pessimistic, well above steady-state usage) and hit a hard
    # CUDA OOM at 0.45 even though actual concurrent usage (Renny x4 + host-
    # helper) was only ~9 GiB of the 97 GiB total (discovered 2026-07-07).
    # Bumped to 0.60 (~59 GiB) — still leaves ~38 GiB headroom for everything
    # else. Re-tune if Renny's real footprint changes.
    - name: NIM_PASSTHROUGH_ARGS
      value: "--gpu-memory-utilization 0.60 --max-model-len 16384"
    # OpenTelemetry -> Phoenix: the NIM exports a span for EVERY LLM call it
    # serves (model name, tokens, latency) regardless of caller — kiosk, the RAG
    # blueprint, agentic flows. This is model-agnostic: Phoenix tracks whatever
    # model this NIM serves. The rag-adapter additionally records readable
    # prompt/response spans for the kiosk conversation path (OpenInference).
    - name: NIM_ENABLE_OTEL
      value: "1"
    - name: OTEL_TRACES_EXPORTER
      value: "otlp"
    - name: OTEL_METRICS_EXPORTER
      value: "otlp"
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: "grpc"
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://phoenix.uneeq.svc.cluster.local:4317"
    - name: OTEL_SERVICE_NAME
      value: "nvidia-nim-llm"
  nodeSelector:
    uneeq.io/node-type: renderer
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
