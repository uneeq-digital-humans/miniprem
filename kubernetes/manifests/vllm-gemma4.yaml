# vLLM serving Gemma 4 E4B-it at FP8 quantization on a single RTX 6000 Ada.
#
# VRAM budget on a shared 48 GB GPU (with Renny + Magpie TTS + Nemotron ASR co-located):
#   ~10 GB weights at FP8 + KV cache for 128K context (--max-model-len limits this)
#
# Prereqs:
#   - hf-token Secret in the nim-models namespace (gemma-4 is a gated model)
#     kubectl create secret generic hf-token \
#       -n nim-models \
#       --from-literal=HF_TOKEN=hf_xxxxxxxxxxxxx
#   - StorageClass exists (we installed microk8s-hostpath alias on local-path-provisioner)
#   - nvidia RuntimeClass exists (installed by GPU Operator)
#
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-gemma4-cache
  namespace: nim-models
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 30Gi
  storageClassName: microk8s-hostpath
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-gemma4
  namespace: nim-models
  labels: { app: vllm-gemma4 }
spec:
  replicas: 1
  selector:
    matchLabels: { app: vllm-gemma4 }
  template:
    metadata:
      labels: { app: vllm-gemma4 }
    spec:
      runtimeClassName: nvidia
      # ASR's chart wants this label too; using the same selector so vLLM
      # lands on GPU nodes in multi-node clusters.
      nodeSelector:
        uneeq.io/node-type: renderer
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--model"
            - "google/gemma-4-E4B-it"
            - "--quantization"
            - "fp8"
            - "--max-model-len"
            - "16384"          # cap KV cache; 32768 + co-tenants blew the 48 GB card and OOM'd ASR
            - "--gpu-memory-utilization"
            - "0.20"           # ~9.5 GB on a 48 GB card. Math: renny ~2.5 + magpie ~13.7 + asr ~7 + this ~9.5 + headroom = 48
                               # If running this manifest alone (no NIM co-tenants), raise to 0.85+ for full perf.
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--served-model-name"
            - "gemma-4-E4B-it"
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
            - name: HUGGINGFACE_HUB_CACHE
              value: /models
            - name: HF_HOME
              value: /models
            - name: VLLM_LOGGING_LEVEL
              value: INFO
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 24Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
          # Cold-start: model download (~10 GB FP8 weights from HF) + vLLM
          # graph compilation can exceed 15 min. startupProbe disables
          # liveness/readiness until it succeeds, then the lean liveness
          # below takes over for the running-state checks.
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 80   # ~40 min total grace for cold start
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-gemma4-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-gemma4
  namespace: nim-models
  labels: { app: vllm-gemma4 }
spec:
  selector: { app: vllm-gemma4 }
  ports:
    - name: http
      port: 8000
      targetPort: http
  type: ClusterIP
