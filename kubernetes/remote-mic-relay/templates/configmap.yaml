apiVersion: v1
kind: ConfigMap
metadata:
  name: remote-mic-relay-src
  namespace: {{ .Release.Namespace }}
  labels:
    app: remote-mic-relay
data:
  # server.js is the canonical relay source at the chart root — mounted verbatim
  # into the node container, so there is nothing to build or push to a registry.
  server.js: |
{{ .Files.Get "server.js" | indent 4 }}
