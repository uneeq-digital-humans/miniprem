# Default image - will be overridden by values file
image: "cr.uneeq.io/uneeq/renny-renderer:0.1184-2f3b7"

deployment:
  # value for uneeq.io/node-type label used as a nodeSelector
  nodeType: renderer
  replicas: 4

# IMPORTANT: Conversation platform (Flowise, etc.) is configured in the
# UneeQ Admin Portal, NOT here. Renny retrieves conversation settings
# from DHOP based on persona configuration.
renderer:
  dhop:
    apiKey: "" # The 'apiKey' parameter is required
    tenantId: "" # The 'tenantId' parameter is required
    url: "" # The 'url' parameter is required (e.g., wss://api.enterprise.uneeq.io:443/signalling-service)
  launchDarkly:
    key: "" # Optional - feature flags
  tts:
    # At least one TTS provider must be configured
    proxyUrl: ""
    veritoneApiKey: ""
    azureRegion: ""
    azureSpeechKey: ""
    elevenlabsApiKey: ""
    elevenlabsModelId: ""
    gcpCredentials: ""
  container:
    requests:
      cpu: 3200m
      memory: 7Gi
    limits:
      cpu: 3200m
      memory: 7Gi
  logLevel: "4"
