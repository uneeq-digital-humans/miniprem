apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: renny
  labels:
    app: renny
spec:
  replicas: {{ .Values.deployment.totalReplicas | default .Values.deployment.replicas }}
  # GPU-heavy: Recreate (not RollingUpdate) so an update/restart NEVER holds two
  # copies of the model in VRAM at once — double-occupancy during rollouts is what
  # starves the other services on a shared single GPU.
  strategy:
    type: Recreate
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: renny
  template:
    metadata:
      labels:
        app: renny
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
    spec:
      {{- if .Values.deployment.nodeType }}
      nodeSelector:
        uneeq.io/node-type: {{ .Values.deployment.nodeType }}
      {{- end }}
      # GPU Operator installs a RuntimeClass named "nvidia" that points
      # containerd at /usr/bin/nvidia-container-runtime. Without this, pods
      # using nvidia.com/gpu resources land on runc and the container has no
      # libcuda.so / Vulkan ICD, so the renderer crashes with
      # VK_ERROR_INCOMPATIBLE_DRIVER.
      runtimeClassName: nvidia
      terminationGracePeriodSeconds: 18000
      imagePullSecrets:
{{- if .Values.imagePullSecrets }}
{{ toYaml .Values.imagePullSecrets | indent 6 }}
{{- else }}
      - name: docker-config
{{- end }}
      containers:
      - name: renny
        image: {{ .Values.image }}
        # Default Always so the moving `enterprise-latest` tag re-pulls each
        # rollout. Pin a digest/version tag + set imagePullPolicy=IfNotPresent
        # in values to freeze a known-good build.
        imagePullPolicy: {{ .Values.imagePullPolicy | default "Always" }}
        ports:
        - containerPort: 8888
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
            nvidia.com/gpu: {{ .Values.resources.requests.gpu | default 1 }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
            nvidia.com/gpu: {{ .Values.resources.limits.gpu | default 1 }}
        command: ["/opt/renny/entrypoint.sh"]
        args: ["/Game/Live_Levels/BlankScene", "-RenderOffScreen", "-ResX=1920", "-ResY=1080", "{{ .Values.renderer.extraCmdArgs }}"]
        env:
        - name: AZURE_REGION
          value: {{ .Values.renderer.tts.azureRegion }}
        - name: AZURE_SPEECH_KEY
          valueFrom:
            secretKeyRef:
              name: renny
              key: tts-azure-speech-key
              optional: true
        - name: DHOP_ADDRESS
          value: "{{ .Values.renderer.dhop.url }}/v2/ws/renderer"
        - name: DHOP_APIKEY
          valueFrom:
            secretKeyRef:
              name: renny
              key: dhop-api-key
        - name: DHOP_FIRST_READY_WAIT_TIME_SECS
          value: "60"
        - name: DHOP_PIXELSTREAMING_ADDRESS
          value: "{{ .Values.renderer.dhop.url }}/v1/ws/pixelstreaming"
        - name: DHOP_TENANTID
          value: {{ .Values.renderer.dhop.tenantId }}
        - name: ELEVEN_LABS_API_KEY
          valueFrom:
            secretKeyRef:
              name: renny
              key: tts-elevenlabs-api-key
        - name: ELEVEN_LABS_MODEL_ID
          value: {{ .Values.renderer.tts.elevenlabsModelId }}
        - name: ELEVEN_LABS_OPTIMIZE_LATENCY_LEVEL
          value: "{{ .Values.renderer.tts.elevenlabsOptimizeLatencyLevel }}"
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: GoogleAuth.json
        - name: INACTIVITY_TIMEOUT_SECS
          # Idle session timeout. Default 600s (10 min) for shared/cloud pods so
          # idle sessions free the GPU. The all-in-one kiosk overrides this to
          # -1.0 (never time out) so an idle, walk-up Renny doesn't blank out —
          # the kiosk app owns when a session starts/ends.
          value: "{{ .Values.renderer.inactivityTimeoutSecs | default "600.0" }}"
        - name: LAUNCH_DARKLY_KEY
          valueFrom:
            secretKeyRef:
              name: renny
              key: launch-darkly-key
              optional: true
        - name: TTS_ADDRESS
          value: {{ .Values.renderer.tts.proxyUrl }}
        {{- if .Values.renderer.tts.rivaServerAddr }}
        # Riva TTS gRPC server address. When the persona's Admin-Portal TTS is
        # NVIDIA Riva, the renderer dials this. Empty → Renny defaults to
        # localhost:50051 (nothing there) → silent digital human.
        - name: RIVA_SERVER_ADDR
          value: {{ .Values.renderer.tts.rivaServerAddr | quote }}
        {{- end }}
        - name: VERITONE_API_KEY
          valueFrom:
            secretKeyRef:
              name: renny
              key: tts-veritone-api-key
              optional: true
        - name: LOG_JSON_FORMAT
          value: "true"
        - name: LOG_LEVEL # Log level for embedded go modules
          value: "info"
        - name: HEALTH_URL
          value: "http://0.0.0.0:8082/health"
        - name: NEW_SPEECH_OVERRIDE
          value: "1"
        # CNS-specific: Headless audio driver (prevents SIGSEGV in audio subsystem)
        - name: SDL_AUDIODRIVER
          value: {{ .Values.renderer.sdlAudioDriver | default "pulse" | quote }}
        # Quality Level: Controls UE5 rendering quality
        # - miniprem: Optimized for dedicated hardware (PC/server) with higher quality
        # - web: Optimized for cloud platforms (AWS/Azure/GCP) with balanced performance
        - name: RENNY_QUALITY_LEVEL
          value: {{ .Values.renderer.qualityLevel | default "web" | quote }}
        # NVIDIA GPU visibility
        - name: NVIDIA_VISIBLE_DEVICES
          value: {{ .Values.renderer.nvidia.visibleDevices | default "all" | quote }}
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: {{ .Values.renderer.nvidia.driverCapabilities | default "all" | quote }}
        {{- if .Values.env }}
        {{- range .Values.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        {{- end }}
        volumeMounts:
        {{- if .Values.renderer.tts.gcpCredentials }}
        - name: gcp-creds
          readOnly: true
          mountPath: /opt/renny/Renny/Binaries/Linux/GoogleAuth.json
          subPath: GoogleAuth.json
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          timeoutSeconds: 1
        startupProbe:
          httpGet:
            path: /health
            port: 8082
          periodSeconds: 10
          # The renderer intentionally delays its ready signal 60s after engine
          # init ("Delaying renderer ready signal for 60.0 seconds") — a 6×10s
          # window expires right at that boundary, so pods crash-looped on
          # timing luck (observed 2026-07-09: one replica up, one killed 6×
          # by "failed startup probe"). 30×10s = 5 min of startup grace; the
          # liveness probe still guards the pod once started.
          failureThreshold: 30
          timeoutSeconds: 2
        tty: true
{{- if .Values.telemetry.enabled }}
      - name: telemetry
        image: curlimages/curl:8.1.0
        command: ["/bin/sh", "/scripts/telemetry-client.sh"]
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "kill -TERM 1; sleep 2"]
        env:
        - name: TELEMETRY_ENABLED
          value: "{{ .Values.telemetry.enabled }}"
        - name: TELEMETRY_BACKEND_URL
          value: "{{ .Values.telemetry.backendUrl }}"
        - name: HEARTBEAT_INTERVAL_SECONDS
          value: "{{ .Values.telemetry.heartbeatInterval }}"
        - name: PLATFORM
          value: "{{ .Values.telemetry.platform }}"
        - name: DEPLOYMENT_ID
          value: "{{ .Values.telemetry.deploymentId }}"
        - name: VERSION
          value: "{{ .Values.image }}"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: telemetry-script
          mountPath: /scripts
        - name: installation-id
          mountPath: /tmp
{{- end }}
      volumes:
        {{- if .Values.renderer.tts.gcpCredentials }}
        - name: gcp-creds
          secret:
            secretName: renny
            items:
            - path: GoogleAuth.json
              key: tts-gcp-creds
        {{- end }}
{{- if .Values.telemetry.enabled }}
        - name: telemetry-script
          configMap:
            name: renny-telemetry
            defaultMode: 0755
        - name: installation-id
          emptyDir: {}
{{- end }}
