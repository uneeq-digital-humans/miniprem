apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: renderer
  labels:
    app: renderer
spec:
  replicas: {{ .Values.deployment.replicas }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: renderer
  template:
    metadata:
      labels:
        app: renderer
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
    spec:
      nodeSelector:
        uneeq.io/node-type: {{ .Values.deployment.nodeType }}
      terminationGracePeriodSeconds: 18000
      imagePullSecrets:
      - name: docker-config
      containers:
      - name: renderer
        image: {{ .Values.image }}
        ports:
        - containerPort: 8888
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
            nvidia.com/gpu: {{ .Values.resources.requests.gpu | default 1 }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
            nvidia.com/gpu: {{ .Values.resources.limits.gpu | default 1 }}
        command: ["/opt/renny/entrypoint.sh"]
        args: ["/Game/Live_Levels/BlankScene", "-RenderOffScreen", "-ResX=1920", "-ResY=1080", "{{ .Values.renderer.extraCmdArgs }}"]
        env:
        - name: A2F_ADDRESS
          value: {{ .Values.renderer.a2f.url }}
        - name: A2F_AUDIO_DELAY_TIME_MS
          value: "240"
        - name: A2F_AUDIO_SAMPLE_RATE
          value: "16000"
        - name: AZURE_REGION
          value: {{ .Values.renderer.tts.azureRegion }}
        - name: AZURE_SPEECH_KEY
          valueFrom:
            secretKeyRef:
              name: renderer
              key: tts-azure-speech-key
        - name: DHOP_ADDRESS
          value: "{{ .Values.renderer.dhop.url }}/v2/ws/renderer"
        - name: DHOP_APIKEY
          valueFrom:
            secretKeyRef:
              name: renderer
              key: dhop-api-key
        - name: DHOP_FIRST_READY_WAIT_TIME_SECS
          value: "60"
        - name: DHOP_PIXELSTREAMING_ADDRESS
          value: "{{ .Values.renderer.dhop.url }}/v1/ws/pixelstreaming"
        - name: DHOP_TENANTID
          value: {{ .Values.renderer.dhop.tenantId }}
        - name: ELEVEN_LABS_API_KEY
          valueFrom:
            secretKeyRef:
              name: renderer
              key: tts-elevenlabs-api-key
        - name: ELEVEN_LABS_MODEL_ID
          value: {{ .Values.renderer.tts.elevenlabsModelId }}
        - name: ELEVEN_LABS_OPTIMIZE_LATENCY_LEVEL
          value: "{{ .Values.renderer.tts.elevenlabsOptimizeLatencyLevel }}"
        - name: FLOWISE_API_KEY
          valueFrom:
            secretKeyRef:
              name: renderer
              key: cp-flowise-api-key
        - name: FLOWISE_URL
          value: {{ .Values.renderer.cp.flowiseUrl }}
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: GoogleAuth.json
        - name: INACTIVITY_TIMEOUT_SECS
          value: "600.0"
        - name: LAUNCH_DARKLY_KEY
          valueFrom:
            secretKeyRef:
              name: renderer
              key: launch-darkly-key
        - name: TTS_ADDRESS
          value: {{ .Values.renderer.tts.proxyUrl }}
        - name: VERITONE_API_KEY
          valueFrom:
            secretKeyRef:
              name: renderer
              key: tts-veritone-api-key
        - name: LOG_JSON_FORMAT
          value: "true"
        - name: LOG_LEVEL # Log level for embedded go modules
          value: "info"
        - name: HEALTH_URL
          value: "http://0.0.0.0:8082/health"
        - name: NEW_SPEECH_OVERRIDE
          value: "1"
        volumeMounts:
        - name: gcp-creds
          readOnly: true
          mountPath: /opt/renny/Renny/Binaries/Linux/GoogleAuth.json
          subPath: GoogleAuth.json
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          timeoutSeconds: 1
        startupProbe:
          httpGet:
            path: /health
            port: 8082
          periodSeconds: 10
          failureThreshold: 6
          timeoutSeconds: 2
        tty: true
{{- if .Values.telemetry.enabled }}
      - name: telemetry
        image: curlimages/curl:8.1.0
        command: ["/bin/sh", "/scripts/telemetry-client.sh"]
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "kill -TERM 1; sleep 2"]
        env:
        - name: TELEMETRY_ENABLED
          value: "{{ .Values.telemetry.enabled }}"
        - name: TELEMETRY_BACKEND_URL
          value: "{{ .Values.telemetry.backendUrl }}"
        - name: HEARTBEAT_INTERVAL_SECONDS
          value: "{{ .Values.telemetry.heartbeatInterval }}"
        - name: PLATFORM
          value: "{{ .Values.telemetry.platform }}"
        - name: DEPLOYMENT_ID
          value: "{{ .Values.telemetry.deploymentId }}"
        - name: VERSION
          value: "{{ .Values.image }}"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: telemetry-script
          mountPath: /scripts
        - name: installation-id
          mountPath: /tmp
{{- end }}
      volumes:
        - name: gcp-creds
          secret:
            secretName: renderer
            items:
            - path: GoogleAuth.json
              key: tts-gcp-creds
{{- if .Values.telemetry.enabled }}
        - name: telemetry-script
          configMap:
            name: renny-telemetry
            defaultMode: 0755
        - name: installation-id
          emptyDir: {}
{{- end }}
