apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Release.Namespace }}
  name: renderer
data:
  # Required keys
  dhop-api-key: {{ .Values.renderer.dhop.apiKey | b64enc }}
  
  # Optional keys - only include if not empty
  {{- if .Values.renderer.cp.flowiseApiKey }}
  cp-flowise-api-key: {{ .Values.renderer.cp.flowiseApiKey | b64enc }}
  {{- else }}
  cp-flowise-api-key: {{ "" | b64enc }}
  {{- end }}
  
  {{- if .Values.renderer.launchDarkly.key }}
  launch-darkly-key: {{ .Values.renderer.launchDarkly.key | b64enc }}
  {{- else }}
  launch-darkly-key: {{ "" | b64enc }}
  {{- end }}
  
  {{- if .Values.renderer.tts.azureSpeechKey }}
  tts-azure-speech-key: {{ .Values.renderer.tts.azureSpeechKey | b64enc }}
  {{- else }}
  tts-azure-speech-key: {{ "" | b64enc }}
  {{- end }}
  
  {{- if .Values.renderer.tts.elevenlabsApiKey }}
  tts-elevenlabs-api-key: {{ .Values.renderer.tts.elevenlabsApiKey | b64enc }}
  {{- else }}
  tts-elevenlabs-api-key: {{ "" | b64enc }}
  {{- end }}
  
  {{- if .Values.renderer.tts.veritoneApiKey }}
  tts-veritone-api-key: {{ .Values.renderer.tts.veritoneApiKey | b64enc }}
  {{- else }}
  tts-veritone-api-key: {{ "" | b64enc }}
  {{- end }}
  
  {{- if .Values.renderer.tts.gcpCredentials }}
  tts-gcp-creds: {{ .Values.renderer.tts.gcpCredentials | b64enc }}
  {{- else }}
  tts-gcp-creds: {{ "" | b64enc }}
  {{- end }}
