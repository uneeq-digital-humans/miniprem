apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Release.Namespace }}
  name: renderer
data:
  # Required keys
  dhop-api-key: {{ .Values.renderer.dhop.apiKey | b64enc }}

  # Optional keys (empty string if not configured)
  # Note: Conversation platform (Flowise) is configured in UneeQ Admin Portal, not here
  launch-darkly-key: {{ .Values.renderer.launchDarkly.key | default "" | b64enc }}
  tts-azure-speech-key: {{ .Values.renderer.tts.azureSpeechKey | default "" | b64enc }}
  tts-elevenlabs-api-key: {{ .Values.renderer.tts.elevenlabsApiKey | default "" | b64enc }}
  tts-veritone-api-key: {{ .Values.renderer.tts.veritoneApiKey | default "" | b64enc }}
  tts-gcp-creds: {{ .Values.renderer.tts.gcpCredentials | default "" | b64enc }}
