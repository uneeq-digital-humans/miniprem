version: '3.8'

# Standalone MiniPrem Monitor for Kubernetes/Docker monitoring
# Use this when you have an EKS/AKS cluster and want to monitor it
# along with local Docker containers
#
# Usage: docker-compose -f docker-compose.monitor.yml up -d
# Access: http://localhost:3001

services:
  miniprem-monitor:
    build:
      context: ../miniprem-monitor
      dockerfile: Dockerfile
    container_name: miniprem-monitor
    network_mode: host  # Access localhost services and Docker daemon directly
    volumes:
      # Docker socket for container monitoring (required)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Kubernetes config for cluster monitoring (optional)
      - ~/.kube:/root/.kube:ro
    restart: unless-stopped
    environment:
      - MONITOR_MODE=standalone
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
