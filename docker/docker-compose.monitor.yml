version: '3.8'

# Standalone MiniPrem Monitor for Kubernetes/Docker monitoring
# Use this when you have an EKS/AKS cluster and want to monitor it
# along with local Docker containers
#
# Usage: docker-compose -f docker-compose.monitor.yml up -d
# Access: http://localhost:3001

services:
  miniprem-monitor:
    build:
      context: ../miniprem-monitor
      dockerfile: Dockerfile
    container_name: miniprem-monitor
    runtime: nvidia
    ports:
      - "3001:3001"  # Frontend access
      - "8000:8000"  # Backend API and WebSocket (needed for terminal)
    volumes:
      # Docker socket for container monitoring (required)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Kubernetes config for cluster monitoring (optional)
      - ~/.kube:/root/.kube:ro
      # AWS credentials for EKS authentication (optional)
      - ~/.aws:/root/.aws:ro
      # Installation ID for telemetry (optional, created during install)
      - /var/lib/miniprem/installation_id:/app/data/installation_id:ro
      # Telemetry state directory (persistent across restarts)
      - /tmp/miniprem_telemetry_state:/app/telemetry_state
    restart: unless-stopped
    environment:
      - MONITOR_MODE=standalone
      - LOG_LEVEL=info
      # UneeQ Tenant ID for Admin Portal link (configure in host environment or .env file)
      - DHOP_TENANTID=${DHOP_TENANTID:-}
      # Telemetry configuration
      - MINIPREM_TELEMETRY_ENDPOINT=https://renny.services.uneeq.io/telemetry/heartbeat
      - MINIPREM_TELEMETRY_DISABLED=${MINIPREM_TELEMETRY_DISABLED:-0}
      # NVIDIA GPU support
      - NVIDIA_VISIBLE_DEVICES=all
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
