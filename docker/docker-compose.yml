name: uneeq-miniprem
include:
  - ./docker-compose.a2f.yml # a2f services
networks:
  miniprem_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
services:
  # Log streamer service
  log-streamer:
    build:
      context: ./log-streamer
      dockerfile: Dockerfile
    container_name: log-streamer
    ports:
      - "8082:8082"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - miniprem_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true
  # Redis service for Flowise
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - miniprem_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true
  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - miniprem_net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    restart: unless-stopped
    networks:
      - miniprem_net
    depends_on:
      prometheus:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
  flowise:
    build:
      context: ./flowise
      dockerfile: Dockerfile
    container_name: flowise
    ports:
      - "3000:3000"
    volumes:
      - flowise_data:/usr/src/.flowise
    environment:
      # Basic configuration
      - PORT=3000
      - DATABASE_TYPE=sqlite
      - DATABASE_PATH=/usr/src/.flowise/database.sqlite
      - NODE_ENV=production
      # Authentication
      - FLOWISE_USERNAME=user
      - FLOWISE_PASSWORD=password
      # API Key for authentication
      - APIKEY_STORAGE_TYPE=json
      - APIKEY_PATH=/usr/src/.flowise
      - FLOWISE_SECRETKEY_OVERWRITE=miniprem_demo_secret_key
      # File upload limit
      - FLOWISE_FILE_SIZE_LIMIT=50mb
      # Redis configuration for queue processing
      - MODE=queue
      - QUEUE_NAME=flowise-queue
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # LangChain tracing
      - LANGCHAIN_CALLBACKS_BACKGROUND=true
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_ENDPOINT=https://api.smith.langchain.com
      - LANGCHAIN_PROJECT=miniprem_demo
      # Metrics
      - ENABLE_METRICS=true
      - METRICS_PROVIDER=prometheus
      - METRICS_INCLUDE_NODE_METRICS=true
      - METRICS_SERVICE_NAME=FlowiseAI
      - METRICS_PORT=9090
    restart: unless-stopped
    networks:
      - miniprem_net
    depends_on:
      redis:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/v1/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
  renny:
    container_name: renny
    command: ["/Game/Live_Levels/BlankScene", "-RenderOffScreen", "-ResX=1920", "-ResY=1080", "-NoTextureStreaming"]
    env_file:
      - docker-compose.env
    extra_hosts:
      - audio2face-gateway:host-gateway
    image: "facemeproduction/renny:0.484-37235"
    network_mode: "host"
    runtime: nvidia
    tty: true
    volumes:
      - ./configuration.dat:/opt/renny/Renny/Binaries/Linux/configuration.dat
    healthcheck:
      test: "curl -f http://localhost:8081/health"
      interval: 10s
      timeout: 500ms
      start_interval: 15s
      retries: 3
    depends_on:
      audio2face_with_emotion:
        condition: service_healthy
      audio2face_controller:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    ports:
      - "8000:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    restart: unless-stopped
    networks:
      - miniprem_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/completions"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
  rime-api:
    image: quay.io/rimelabs/api:v0.0.2-20250407
    container_name: rime-api
    depends_on:
      - rime-model
    ports:
      - "8100:8000"
    restart: unless-stopped
    environment:
      - MODEL_URL=http://rime-model:8080/invocations
    networks:
      - miniprem_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
  rime-model:
    image: quay.io/rimelabs/mistv2:v0.0.1-20250403
    container_name: rime-model
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all
    ports:
      - "8101:8080"
    restart: unless-stopped
    networks:
      - miniprem_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    runtime: nvidia
  # --- Speech-to-Text Backend: Only enable ONE of the following ---
  # The install script will uncomment your choice based on the WHISPER_TYPE environment variable

  # whisper:
  #   image: onerahmet/openai-whisper-asr-webservice:latest
  #   container_name: whisper
  #   ports:
  #     - "9000:9000"
  #   volumes:
  #     - whisper_data:/root/.cache/whisper
  #   runtime: nvidia
  #   environment:
  #     - ASR_MODEL=medium
  #     - ASR_ENGINE=openai_whisper
  #     - NVIDIA_VISIBLE_DEVICES=all
  #     - INTERVAL=5
  #   restart: unless-stopped
  #   networks:
  #     - miniprem_net
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 60s
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"
  #   security_opt:
  #     - no-new-privileges:true

  fastwhisper:
    build:
      context: ./fast-whisper
      dockerfile: Dockerfile
    container_name: fastwhisper
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "9000:9000"
    volumes:
      - ./fast-whisper/app:/app/app
      - ./fast-whisper/models:/app/models
    restart: unless-stopped
    networks:
      - miniprem_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
volumes:
  flowise_data:
  redis_data:
  prometheus_data:
  grafana_data:
  vllm_data:
  whisper_data:
