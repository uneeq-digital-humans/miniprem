name: uneeq-miniprem

include:
  - ./docker-compose.a2f.yml # a2f services
  
services:
  log-streamer:
    build:
      context: ./log-streamer
      dockerfile: Dockerfile
    container_name: log-streamer
    ports:
      - "8082:8082"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8082/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true
  
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    network_mode: host
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
  
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    restart: unless-stopped
    network_mode: host
    depends_on:
      prometheus:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
  
  flowise:
    build:
      context: ./flowise
      dockerfile: Dockerfile
    container_name: flowise
    ports:
      - "3000:3000"
    volumes:
      - flowise_data:/usr/src/.flowise
    environment:
      # Basic configuration
      - PORT=3000
      - DATABASE_TYPE=sqlite
      - DATABASE_PATH=/usr/src/.flowise/database.sqlite
      - NODE_ENV=production
      - LOG_LEVEL=debug
      # Authentication
      - FLOWISE_USERNAME=user
      - FLOWISE_PASSWORD=password
      # API Key for authentication
      - APIKEY_STORAGE_TYPE=json
      - APIKEY_PATH=/usr/src/.flowise
      - FLOWISE_SECRETKEY_OVERWRITE=miniprem_demo_secret_key
      # File upload limit
      - FLOWISE_FILE_SIZE_LIMIT=50mb
      # Disable queue mode temporarily
      - MODE=local
      # Disable LangChain tracing
      - LANGCHAIN_TRACING_V2=false
      # Debug settings
      - DEBUG=flowise:*
    restart: unless-stopped
    network_mode: host
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/v1/ping', (res) => process.exit(res.statusCode === 200 ? 0 : 1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
  
  renny:
    container_name: renny
    command: ["/Game/Live_Levels/BlankScene", "-RenderOffScreen", "-ResX=1920", "-ResY=1080", "-NoTextureStreaming"]
    env_file:
      - docker-compose.env
    extra_hosts:
      - "audio2face-gateway:127.0.0.1"
    # image: "facemeproduction/renny:0.484-37235"
    # image: "facemeproduction/renny:0.504-e34483_byo_experiments"
    image: "facemeproduction/renny:0.514-21f16_byo_experiments"
    network_mode: host
    runtime: nvidia
    tty: true
    volumes:
      - ./configuration.dat:/opt/renny/Renny/Binaries/Linux/configuration.dat
    healthcheck:
      test: "curl -f http://localhost:8081/health"
      interval: 10s
      timeout: 500ms
      start_interval: 15s
      retries: 3
    depends_on:
      audio2face_with_emotion:
        condition: service_healthy
      audio2face_controller:
        condition: service_started
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:v0.2.7
    container_name: vllm
    ports:
      - "8000:8800"
    volumes:
      - vllm_data:/root/.cache/huggingface
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/root/.cache/huggingface
      - HF_CACHE_DIR=/root/.cache/huggingface/cache
    entrypoint: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
    command: ["--model", "HuggingFaceH4/zephyr-7b-beta", "--host", "0.0.0.0", "--port", "8800", "--gpu-memory-utilization", "0.8", "--trust-remote-code"]
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8800/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
  
  # --- Speech-to-Text Backend: Only enable ONE of the following ---
