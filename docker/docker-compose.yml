  ### FASTWHISPER BEGIN ###
  fastwhisper:
    build:
      context: ./fast-whisper
      dockerfile: Dockerfile
    container_name: fastwhisper
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_SIZE=tiny.en
      - COMPUTE_TYPE=float16
      - NUM_WORKERS=1
      - CPU_THREADS=4
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb=256
      - CUDA_LAUNCH_BLOCKING=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: 1
    ports:
      - "9000:9000"
    volumes:
      - ./fast-whisper/app:/app/app
      - ./fast-whisper/models:/app/models
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
