name: uneeq-miniprem

services:
  # Renny uses internal speech processing (NEW_SPEECH_OVERRIDE=1)

  # === MONITORING SERVICE ===
  miniprem-monitor:
    image: "cr.uneeq.io/public/miniprem-monitor@sha256:dcad83fb9c7d21ce0d6badb1973b1df5b7cbc053341254b4bd96a5b3c1c456da"
    container_name: miniprem-monitor
    runtime: nvidia  # GPU access for machine_id generation via nvidia-smi
    network_mode: host  # Direct access to Docker daemon and localhost services
    volumes:
      # Docker socket for container monitoring (required)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Kubernetes config for cluster monitoring (optional)
      - ~/.kube:/root/.kube:ro
      # Installation ID for telemetry (optional, created during install)
      - /var/lib/miniprem/installation_id:/app/data/installation_id:ro
      # Telemetry state directory (persistent across restarts)
      - /tmp/miniprem_telemetry_state:/app/telemetry_state
    restart: unless-stopped
    environment:
      - MONITOR_MODE=default
      - LOG_LEVEL=info
      - MINIPREM_TELEMETRY_ENDPOINT=https://renny.services.uneeq.io/telemetry/heartbeat
      - MINIPREM_TELEMETRY_DISABLED=${MINIPREM_TELEMETRY_DISABLED:-0}
      - NVIDIA_VISIBLE_DEVICES=all
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # === MAIN SERVICE: Renny with internal speech processing ===
  renny:
    container_name: renny
    command: ["/Game/Live_Levels/BlankScene", "-RenderOffScreen", "-ResX=1920", "-ResY=1080", "-NoTextureStreaming"]
    entrypoint: ["/opt/renny/renny-entrypoint.sh"]
    env_file:
      - docker-compose.env
    environment:
      - NEW_SPEECH_OVERRIDE=1
      - RENNY_TTS_USE_PROTO_API_KEY=1
      - MINIPREM_TELEMETRY_DISABLED=${MINIPREM_TELEMETRY_DISABLED:-0}
      - TELEMETRY_BACKEND_URL=https://renny.services.uneeq.io
      - HEARTBEAT_INTERVAL_SECONDS=900
      - PLATFORM=docker
      - INSTALLATION_ID_FILE=/app/data/installation_id
    image: "cr.uneeq.io/uneeq/renny-renderer:0.1184-2f3b7"
    network_mode: "host"
    runtime: nvidia
    privileged: true
    tty: true
    volumes:
      - ./configuration.dat:/opt/renny/Renny/Binaries/Linux/configuration.dat
      - ./renny-entrypoint.sh:/opt/renny/renny-entrypoint.sh:ro
      - ./renny-telemetry-client.sh:/opt/renny/telemetry-client.sh:ro
      - /var/lib/miniprem/installation_id:/app/data/installation_id
      - /tmp/miniprem_telemetry_state:/app/telemetry_state
    healthcheck:
      test: "curl -f http://localhost:8081/health"
      interval: 10s
      timeout: 500ms
      start_interval: 15s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

# No volumes needed for default Renny-only installation