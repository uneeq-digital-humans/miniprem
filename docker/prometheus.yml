global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'flowise'
    static_configs:
      - targets: ['localhost:3000']
    metrics_path: /metrics

  # Phoenix LLM Observability (if enabled)
  - job_name: 'phoenix'
    static_configs:
      - targets: ['localhost:9091']
    metrics_path: /metrics

  # MiniPrem Monitor
  - job_name: 'miniprem-monitor'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: /metrics

  # Renny Renderer
  - job_name: 'renny'
    static_configs:
      - targets: ['localhost:8081']
    metrics_path: /metrics