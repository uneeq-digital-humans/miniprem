name: uneeq-miniprem

services:
  # === FIRST TIER: Audio2Face services ===
  audio2face_with_emotion:
    container_name: audio2face_with_emotion
    environment:
      LOG_JSON: false
    image: facemeproduction/audio2face_with_emotion:local-dev
    ports:
      - 50000:50000
    runtime: nvidia
    privileged: true
    volumes:
      - a2f_model_cache:/tmp/a2f_pipeline:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:50000/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # Allow 2 minutes for model loading
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  audio2face_controller:
    container_name: audio2face_controller
    command: /opt/nvidia/anim_controller/service/ac_a2x_config.yaml
    entrypoint: ./service/launch_service.py
    environment:
      LOG_JSON: false
    image: facemeproduction/audio2face_anim_controller:local-dev
    ports:
      - 52000:52000
      - 52100:52100
    volumes:
      - ./a2f-config.yml:/opt/nvidia/anim_controller/service/ac_a2x_config.yaml
    depends_on:
      audio2face_with_emotion:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:52000/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # === SECOND TIER: Renny (comes last) ===
  renny:
    container_name: renny
    command: ["/Game/Live_Levels/BlankScene", "-RenderOffScreen", "-ResX=1920", "-ResY=1080", "-NoTextureStreaming"]
    env_file:
      - docker-compose.env
    extra_hosts:
      - audio2face-gateway:127.0.0.1
    image: "facemeproduction/renny:0.540-40978"
    network_mode: "host"
    runtime: nvidia
    privileged: true
    tty: true
    volumes:
      - ./configuration.dat:/opt/renny/Renny/Binaries/Linux/configuration.dat
    healthcheck:
      test: "curl -f http://localhost:8081/health"
      interval: 10s
      timeout: 500ms
      start_interval: 15s
      start_period: 10s
      retries: 3
    depends_on:
      audio2face_with_emotion:
        condition: service_healthy
      audio2face_controller:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  a2f_model_cache: