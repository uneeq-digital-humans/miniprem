name: uneeq-miniprem

services:
  # Renny uses internal speech processing (NEW_SPEECH_OVERRIDE=1)

  # === MONITORING SERVICE ===
  miniprem-monitor:
    build:
      context: ../miniprem-monitor
      dockerfile: Dockerfile
    container_name: miniprem-monitor
    network_mode: host  # Direct access to Docker daemon and localhost services
    volumes:
      # Docker socket for container monitoring (required)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Kubernetes config for cluster monitoring (optional)
      - ~/.kube:/root/.kube:ro
    restart: unless-stopped
    environment:
      - MONITOR_MODE=default
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # === MAIN SERVICE: Renny with internal speech processing ===
  renny:
    container_name: renny
    command: ["/Game/Live_Levels/BlankScene", "-RenderOffScreen", "-ResX=1920", "-ResY=1080", "-NoTextureStreaming"]
    env_file:
      - docker-compose.env
    environment:
      - NEW_SPEECH_OVERRIDE=1
    image: "facemeproduction/renny:5.6speechanim"
    network_mode: "host"
    runtime: nvidia
    privileged: true
    tty: true
    volumes:
      - ./configuration.dat:/opt/renny/Renny/Binaries/Linux/configuration.dat
    healthcheck:
      test: "curl -f http://localhost:8081/health"
      interval: 10s
      timeout: 500ms
      start_interval: 15s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

# No volumes needed for default Renny-only installation