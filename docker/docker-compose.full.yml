  #           - driver: nvidia
  #             capabilities: [gpu]
  #             count: all
  #   privileged: true
  #   ports:
  #     - "8101:8080"
  #   restart: unless-stopped
  #   network_mode: host
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 10
  #     start_period: 120s  # Increased start period for model loading
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"
  #   security_opt:
  #     - no-new-privileges:true
  #   runtime: nvidia
  # 
  # rime-api:
  #   image: quay.io/rimelabs/api:v0.0.2-20250407
  #   container_name: rime-api
  #   depends_on:
  #     rime-model:
  #       condition: service_healthy
  #   ports:
  #     - "8100:8000"
  #   restart: unless-stopped
  #   environment:
  #     - MODEL_URL=http://localhost:8080/invocations
  #   network_mode: host
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -s http://localhost:8000/health > /dev/null || exit 0"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 15s
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"
  #   security_opt:
  #     - no-new-privileges:true
  ### RIME END ###

  # === FIFTH TIER: Renny (comes last) ===
  renny:
    container_name: renny
    command: ["/Game/Live_Levels/BlankScene", "-RenderOffScreen", "-ResX=1920", "-ResY=1080", "-NoTextureStreaming"]
    entrypoint: ["/opt/renny/renny-entrypoint.sh"]
    env_file:
      - docker-compose.env
    environment:
      - NEW_SPEECH_OVERRIDE=1
      - MINIPREM_TELEMETRY_DISABLED=${MINIPREM_TELEMETRY_DISABLED:-0}
      - TELEMETRY_BACKEND_URL=https://renny.services.uneeq.io
      - HEARTBEAT_INTERVAL_SECONDS=900
      - PLATFORM=docker
      - INSTALLATION_ID_FILE=/app/data/installation_id
    image: "facemeproduction/renny:0.713-37d59"
    network_mode: host
    runtime: nvidia
    privileged: true
    tty: true
    volumes:
      - ./configuration.dat:/opt/renny/Renny/Binaries/Linux/configuration.dat
      - ./renny-entrypoint.sh:/opt/renny/renny-entrypoint.sh:ro
      - ./renny-telemetry-client.sh:/opt/renny/telemetry-client.sh:ro
      - /tmp/miniprem_installation_id:/app/data/installation_id
      - /tmp/miniprem_telemetry_state:/app/telemetry_state
    healthcheck:
      test: "curl -f http://localhost:8081/health"
      interval: 10s
      timeout: 500ms
      start_interval: 15s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # --- Speech-to-Text Backend: Only enable ONE of the following ---
  # The install script will uncomment your choice based on the WHISPER_TYPE environment variable

  ### WHISPER BEGIN ###
  # whisper:
  #   image: onerahmet/openai-whisper-asr-webservice:latest
  #   container_name: whisper
  #   ports:
  #     - "9000:9000"
  #   volumes:
  #     - whisper_data:/root/.cache/whisper
  #   runtime: nvidia
  #   privileged: true
  #   environment:
  #     - ASR_MODEL=medium
  #     - ASR_ENGINE=openai_whisper
  #     - NVIDIA_VISIBLE_DEVICES=all
  #     - INTERVAL=5
  #   restart: unless-stopped
  #   network_mode: host
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 120s  # Increased for model loading
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"
  #   security_opt:
  #     - no-new-privileges:true
  #   depends_on:
  #     vllm:
  #       condition: service_healthy
  ### WHISPER END ###

  ### FASTWHISPER BEGIN ###
  fastwhisper:
    build:
      context: ./fast-whisper
      dockerfile: Dockerfile
    container_name: fastwhisper
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_SIZE=tiny.en
      - COMPUTE_TYPE=float16
      - NUM_WORKERS=1
      - CPU_THREADS=4
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb=256
      - CUDA_LAUNCH_BLOCKING=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: 1
    privileged: true
    ports:
      - "9000:9000"
    volumes:
      - ./fast-whisper/app:/app/app
      - ./fast-whisper/models:/app/models
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    depends_on:
      vllm:
        condition: service_healthy
  ### FASTWHISPER END ###

volumes:
  flowise_data:
  redis_data:
  prometheus_data:
  grafana_data:
  vllm_data:
  whisper_data: