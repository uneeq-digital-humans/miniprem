# Phoenix dev stack for local Mac testing — no GPU/vLLM required.
# Connect Flowise to any external LLM (OpenAI, Anthropic, Ollama, etc.) via the UI.
#
# Usage:
#   PHOENIX_ENABLED=true docker compose -f docker-compose.phoenix-dev.yml up -d
#
# Services:
#   Flowise      → http://localhost:3000  (user: user / pass: password)
#   Phoenix      → http://localhost:6006  (traces)
#   Prometheus   → http://localhost:9090  (metrics)
#   Grafana      → http://localhost:3002  (dashboards — admin/admin)

services:
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - "6006:6006"
      - "4317:4317"
      - "9091:9090"
    environment:
      - PHOENIX_ENABLE_PROMETHEUS=true
      - PHOENIX_WORKING_DIR=/phoenix
      - PHOENIX_PORT=6006
    volumes:
      - phoenix_data:/phoenix
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6006/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    network_mode: host
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SERVER_HTTP_PORT=3002
    restart: unless-stopped
    network_mode: host
    depends_on:
      prometheus:
        condition: service_healthy

  flowise:
    build:
      context: ./flowise
      dockerfile: Dockerfile
    container_name: flowise
    ports:
      - "3000:3000"
    volumes:
      - flowise_data:/usr/src/.flowise
    environment:
      - PORT=3000
      - DATABASE_TYPE=sqlite
      - DATABASE_PATH=/usr/src/.flowise/database.sqlite
      - NODE_ENV=production
      - FLOWISE_USERNAME=user
      - FLOWISE_PASSWORD=password
      - APIKEY_STORAGE_TYPE=json
      - APIKEY_PATH=/usr/src/.flowise
      - FLOWISE_SECRETKEY_OVERWRITE=miniprem_demo_secret_key
      - FLOWISE_FILE_SIZE_LIMIT=50mb
      - MODE=local
      # Phoenix tracing
      - PHOENIX_ENABLED=${PHOENIX_ENABLED:-false}
      - NODE_OPTIONS=--require /otel/otel-init.js --max-old-space-size=8192
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
      - OTEL_SERVICE_NAME=flowise
    restart: unless-stopped
    network_mode: host
    depends_on:
      prometheus:
        condition: service_healthy
      phoenix:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/v1/ping', (res) => process.exit(res.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  phoenix_data:
  prometheus_data:
  grafana_data:
  flowise_data:
